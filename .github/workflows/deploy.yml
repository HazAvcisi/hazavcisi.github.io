name: Deploy Special Request Website

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is called master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Telegram Credentials from Secrets
        run: |
          sed -i "s|{{TELEGRAM_TOKEN}}|${{ secrets.TELEGRAM_TOKEN }}|g" index.html
          sed -i "s|{{TELEGRAM_CHAT_ID}}|${{ secrets.TELEGRAM_CHAT_ID }}|g" index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
